schema_version = 1

[repository]
owner = "kmosoti"
name = "dev-space"
default_branch = "main"
worker_authority = "fork"
worker_fork_owner = "kz-harbringer"

[project]
owner = "kmosoti"
title = "dev-space"
short_description = "Operational source of truth for the dev-space control plane and agent workflow."
readme = """# dev-space control plane

This Project v2 is the operational source of truth for work membership and live workflow state.

Repository policy defines the desired schema and governance. Epics contain bounded implementation issues; Epics never own implementation branches or pull requests.
"""
public = false

[[project.fields]]
name = "Status"
data_type = "SINGLE_SELECT"
options = [
  { name = "Inbox", description = "Captured but not classified.", color = "GRAY" },
  { name = "Needs Definition", description = "Specification or decision work remains.", color = "YELLOW" },
  { name = "Ready", description = "Planner-approved and dependency-complete.", color = "BLUE" },
  { name = "In Progress", description = "An authorized implementation session is active.", color = "YELLOW" },
  { name = "In Review", description = "A verified pull request is ready for human review.", color = "PURPLE" },
  { name = "Blocked", description = "A recorded condition prevents progress.", color = "RED" },
  { name = "Done", description = "Accepted and merged by the human authority.", color = "GREEN" },
  { name = "Canceled", description = "Intentionally stopped with a recorded reason.", color = "GRAY" },
]

[[project.fields]]
name = "Work Type"
data_type = "SINGLE_SELECT"
options = [
  { name = "Epic", description = "Overall plan or outcome; never implemented directly.", color = "PURPLE" },
  { name = "Change", description = "Bounded capability increment.", color = "BLUE" },
  { name = "Bug", description = "Observed defect with regression coverage.", color = "RED" },
  { name = "Maintenance", description = "Bounded operational or dependency work.", color = "GRAY" },
  { name = "Decision", description = "Product, architecture, security, or policy choice.", color = "YELLOW" },
]

[[project.fields]]
name = "Execution"
data_type = "SINGLE_SELECT"
options = [
  { name = "Agent-ready", description = "Fully specified for autonomous worker execution.", color = "GREEN" },
  { name = "Agent-assisted", description = "Requires planned human checkpoints.", color = "YELLOW" },
  { name = "Human-only", description = "Must not be executed by the worker identity.", color = "RED" },
]

[[project.fields]]
name = "Risk"
data_type = "SINGLE_SELECT"
options = [
  { name = "Low", description = "Small and readily reversible.", color = "GREEN" },
  { name = "Medium", description = "Reviewable with explicit rollback.", color = "YELLOW" },
  { name = "High", description = "Requires human-led execution or a dedicated decision.", color = "RED" },
]

[[project.fields]]
name = "Development Branch"
data_type = "TEXT"

[[project.views]]
name = "Inbox and Needs Definition"
layout = "TABLE"
filter = "Status:Inbox,\"Needs Definition\""
fields = ["Title", "Status", "Work Type", "Execution", "Risk", "Repository"]

[[project.views]]
name = "Agent Ready"
layout = "TABLE"
filter = "Status:Ready Execution:Agent-ready"
fields = ["Title", "Status", "Execution", "Risk", "Development Branch"]

[[project.views]]
name = "Active Work"
layout = "BOARD"
filter = "Status:\"In Progress\",\"In Review\""
group_by = "Status"
fields = ["Title", "Execution", "Risk", "Development Branch"]

[[project.views]]
name = "Review Queue"
layout = "TABLE"
filter = "Status:\"In Review\""
fields = ["Title", "Status", "Risk", "Development Branch", "Assignees"]

[[project.views]]
name = "Epics"
layout = "TABLE"
filter = "\"Work Type\":Epic"
fields = ["Title", "Status", "Sub-issues progress", "Risk"]

[[project.views]]
name = "Blocked"
layout = "TABLE"
filter = "Status:Blocked"
fields = ["Title", "Status", "Execution", "Risk", "Assignees"]

[[project.views]]
name = "Recently Completed"
layout = "TABLE"
filter = "Status:Done"
fields = ["Title", "Status", "Work Type", "Repository"]

[[project.workflows]]
name = "Item closed"
enabled = false
configuration = { reason = "Done requires an explicit planner-authorized transition after human merge." }

[actors.planner]
login = "kmosoti"
ssh_host = "github.com"
commit_name = "Kennedy Mosoti"
commit_email = "47609243+kmosoti@users.noreply.github.com"

[actors.worker]
login = "kz-harbringer"
ssh_host = "github.com-kz"
commit_name = "kz-harbringer"
commit_email = "kz-harbringer@users.noreply.github.com"
gh_config_dir = "~/.config/dev-space/agent-gh"

[branch]
template = "mutation/issue-{number}-{slug}"

[checks]
required = ["Fast QA Feedback", "Control Plane Contract"]

[verification]
focused = ["uv run pytest --capture=sys"]
full = [
  "uv run pytest --capture=sys",
  "uv run ruff check .",
  "uv run ruff format --check .",
  "uv run vulture",
  "PYO3_PYTHON=${PWD}/.venv/bin/python cargo test --locked",
  "PYO3_PYTHON=${PWD}/.venv/bin/python cargo clippy --locked --all-targets --all-features -- -D warnings",
]

[lifecycle]
states = ["Inbox", "Needs Definition", "Ready", "In Progress", "In Review", "Blocked", "Done", "Canceled"]

[ruleset]
name = "dev-space-main-protection"
enforcement = "active"
approvals = 1
require_code_owner_review = true
dismiss_stale_reviews = true
require_last_push_approval = true
require_conversation_resolution = true

