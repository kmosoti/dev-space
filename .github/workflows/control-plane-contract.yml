name: Control Plane Contract

on:
  pull_request_target:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  contract:
    name: Control Plane Contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted base policy
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Install trusted validator
        run: uv sync --frozen

      - name: Validate planner and worker contract
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python .github/scripts/control-plane-contract.py
