name: Decision
description: Resolve a product, architecture, security, or policy choice before implementation.
title: "[Decision]: "
labels: ["type:decision", "execution:human-only", "status:needs-definition", "human-required"]
body:
  - type: input
    id: parent
    attributes: {label: Parent Epic, placeholder: "#123"}
    validations: {required: true}
  - type: textarea
    id: decision
    attributes: {label: Decision required}
    validations: {required: true}
  - type: textarea
    id: options
    attributes: {label: Options considered}
    validations: {required: true}
  - type: textarea
    id: constraints
    attributes: {label: Constraints and tradeoffs}
    validations: {required: true}
  - type: textarea
    id: affected
    attributes: {label: Affected child issues}
    validations: {required: true}
  - type: textarea
    id: outcome
    attributes: {label: Decision and rationale}
    validations: {required: true}
